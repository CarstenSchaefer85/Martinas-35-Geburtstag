<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unser Quiz ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

	<div id="login">
		<h1>
			Liebe Martina ❤️,<br>
			alles Gute zum Geburtstag
		</h1>
		<p>
			Ich habe ein kleines Rätsel für dich vorbereitet.<br>
			Beantworte die Fragen und erspiele das geheime Lösungswort zu deinem Geschenk.
		</p>
		<p>
			Gib dein Geburtsdatum ein:
		</p>
		<input id="code" placeholder="DD.MM.YYYY">
		<button onclick="login()">Start</button>
	</div>

	<div id="quiz" style="display:none">
		<h2 id="title"></h2>
		<div class="progress">
			<div id="bar"></div>
		</div>
		<div id="letters"></div>

		<div class="question-box">
			<h2 id="question"></h2>
			<div id="answers"></div>
		</div>
	</div>

	<div id="result" style="display:none">
		<h2>🎉 Geschafft!</h2>
		<p id="resultText"></p>
	</div>

</div>
<script src="script.js"></script>

</body>
</html>
