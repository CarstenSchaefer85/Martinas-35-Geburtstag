<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1 id="message">Hallo Welt!</h1>
    <button onclick="changeMessage()">Klick mich</button>

    <script>
        function changeMessage() {
            document.getElementById("message").textContent = "Hello World mit JavaScript!";
        }
    </script>

</body>
</html>
